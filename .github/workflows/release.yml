name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            args: ""
            target: ""
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Add Rust target (macOS)
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code signing when secrets are not configured
          CI: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TermiusClone ${{ github.ref_name }}"
          releaseBody: |
            ## Downloads

            | Platform | File |
            |---|---|
            | macOS Apple Silicon (M1/M2/M3) | `TermiusClone_*_aarch64.dmg` |
            | macOS Intel | `TermiusClone_*_x64.dmg` |
            | Windows | `TermiusClone_*_x64-setup.exe` |

            **macOS**: Nếu bị Gatekeeper chặn → System Settings → Privacy & Security → Open Anyway.
            **Windows**: Nếu SmartScreen cảnh báo → More info → Run anyway.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
