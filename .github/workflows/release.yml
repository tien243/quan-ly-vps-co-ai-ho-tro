name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-13
            args: "--target x86_64-apple-darwin"
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: windows-latest
            args: ""
            target: ""
            label: Windows

    runs-on: ${{ matrix.platform }}
    name: Build — ${{ matrix.label }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Rust ─────────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      # ── macOS: Install target if not default ─────────────────────────────
      - name: Add macOS Rust target
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      - name: Add macOS Intel Rust target
        if: matrix.platform == 'macos-13'
        run: rustup target add x86_64-apple-darwin

      # ── Install frontend dependencies ─────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (optional — leave empty to skip)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing (optional)
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TermiusClone ${{ github.ref_name }}"
          releaseBody: |
            ## TermiusClone ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Description |
            |---|---|---|
            | macOS (Apple Silicon) | `TermiusClone_*_aarch64.dmg` | M1/M2/M3 Mac |
            | macOS (Intel) | `TermiusClone_*_x64.dmg` | Intel Mac |
            | Windows | `TermiusClone_*_x64-setup.exe` | Windows installer |
            | Windows | `TermiusClone_*_x64_en-US.msi` | MSI installer |

            ### Installation
            - **macOS**: Open `.dmg` → drag to Applications
            - **Windows**: Run `.exe` or `.msi` installer

            > **Note**: macOS may show "unidentified developer" warning if unsigned. Go to System Settings → Privacy & Security → Open Anyway.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
